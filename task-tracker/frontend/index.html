<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="page-header">
        <div>
            <h1>Task Tracker</h1>
            <p>A simple Kanban board for moving work from idea to done.</p>
        </div>
        <button type="button" id="new-task-btn" class="btn-primary">New Task</button>
    </header>

    <!-- Client-side filters over the already-fetched tasks (DD-4, TG-3).
         Changing one is a pure re-render — never a request. -->
    <div class="filter-bar">
        <label class="filter-toggle">
            <input type="checkbox" id="filter-overdue">
            Overdue only
        </label>
        <label class="filter-label" for="filter-tag">Tag</label>
        <!-- Options are rebuilt from the task list after every fetch. -->
        <select id="filter-tag" class="filter-select">
            <option value="">All tags</option>
        </select>
    </div>

    <!-- Board-level status: shown during loading and on fetch failure. -->
    <div id="board-status" class="board-status" hidden></div>

    <main class="board">
        <!-- data-status holds the stable, API-facing key; the visible label differs. -->
        <section class="column" data-status="ToDo">
            <div class="column-header">
                <span class="column-title">To Do</span>
                <span class="column-count" data-count>0</span>
            </div>
            <div class="card-list" data-status="ToDo"></div>
        </section>

        <section class="column" data-status="InProgress">
            <div class="column-header">
                <span class="column-title">In Progress</span>
                <span class="column-count" data-count>0</span>
            </div>
            <div class="card-list" data-status="InProgress"></div>
        </section>

        <section class="column" data-status="Done">
            <div class="column-header">
                <span class="column-title">Done</span>
                <span class="column-count" data-count>0</span>
            </div>
            <div class="card-list" data-status="Done"></div>
        </section>
    </main>

    <!-- Card markup lives in one place so tasks can be rendered from data later. -->
    <template id="card-template">
        <article class="card" data-id="" data-priority="" draggable="true">
            <h3 class="card-title"></h3>
            <p class="card-description"></p>
            <div class="card-meta">
                <span class="priority-pill" data-priority=""></span>
                <span class="assignee"></span>
                <span class="due-date"></span>
                <button type="button" class="edit-btn">Edit</button>
            </div>
            <div class="card-tags"></div>
        </article>
    </template>

    <!-- Create/edit task modal. Hidden until opened from "New Task" or a card's Edit. -->
    <div id="task-modal" class="modal-overlay" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">New Task</h2>
                <button type="button" id="modal-close" class="modal-close" aria-label="Close">&times;</button>
            </div>

            <form id="task-form" novalidate>
                <input type="hidden" name="taskId" id="field-taskId">

                <div class="form-banner" id="form-banner" hidden></div>

                <div class="field">
                    <label for="field-title">Title</label>
                    <input type="text" id="field-title" name="title" autocomplete="off">
                    <p class="field-error" data-error-for="title" hidden></p>
                </div>

                <div class="field">
                    <label for="field-description">Description</label>
                    <textarea id="field-description" name="description" rows="3"></textarea>
                    <p class="field-error" data-error-for="description" hidden></p>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label for="field-status">Status</label>
                        <select id="field-status" name="status">
                            <option value="ToDo">To Do</option>
                            <option value="InProgress">In Progress</option>
                            <option value="Done">Done</option>
                        </select>
                        <p class="field-error" data-error-for="status" hidden></p>
                    </div>
                    <div class="field">
                        <label for="field-priority">Priority</label>
                        <select id="field-priority" name="priority">
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                        <p class="field-error" data-error-for="priority" hidden></p>
                    </div>
                </div>

                <div class="field">
                    <label for="field-assignee">Assignee</label>
                    <input type="text" id="field-assignee" name="assignee" autocomplete="off">
                    <p class="field-error" data-error-for="assignee" hidden></p>
                </div>

                <div class="field">
                    <label for="field-due_date">Due Date</label>
                    <input type="date" id="field-due_date" name="due_date">
                    <p class="field-error" data-error-for="due_date" hidden></p>
                </div>

                <!-- The chips inside .tag-chips are the source of truth for the
                     submitted array; #tag-entry is only a staging text box and
                     is deliberately unnamed so it never posts itself. -->
                <div class="field">
                    <label for="tag-entry">Tags</label>
                    <div class="tag-input" id="tag-input">
                        <span class="tag-chips" id="tag-chips"></span>
                        <input type="text" id="tag-entry" autocomplete="off" placeholder="Add a tag, press Enter">
                    </div>
                    <p class="field-error" data-error-for="tags" hidden></p>
                </div>

                <div class="modal-footer">
                    <button type="button" id="modal-cancel" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>

</body>

</html>
