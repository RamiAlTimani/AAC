<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>

    <style>
        /* ---- Design tokens --------------------------------------------- */
        :root {
            --bg: #eef1f5;
            --surface: #ffffff;
            --surface-sunk: #f6f8fb;
            --ink: #1c2430;
            --ink-soft: #55606f;
            --ink-faint: #8a94a3;
            --line: #dfe4ec;

            /* Priority accents — the one place we spend color. */
            --p-high: #e5484d;
            --p-medium: #d98a15;
            --p-low: #3a8f5c;

            --radius: 10px;
            --shadow: 0 1px 2px rgba(20, 30, 45, 0.06), 0 4px 12px rgba(20, 30, 45, 0.05);
            --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: var(--font);
            color: var(--ink);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
            line-height: 1.45;
        }

        /* ---- Header ---------------------------------------------------- */
        .page-header {
            max-width: 1180px;
            margin: 0 auto;
            padding: 32px 24px 8px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .page-header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .page-header p {
            margin: 4px 0 0;
            color: var(--ink-soft);
            font-size: 14.5px;
        }

        /* ---- Board ----------------------------------------------------- */
        .board {
            max-width: 1180px;
            margin: 0 auto;
            padding: 20px 24px 48px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            align-items: start;
        }

        .column {
            background: var(--surface-sunk);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 12px;
        }

        .column-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 6px 12px;
        }

        .column-title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--ink-soft);
        }

        .column-count {
            font-size: 12px;
            font-weight: 600;
            color: var(--ink-faint);
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 1px 8px;
        }

        .card-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 24px;
        }

        /* ---- Card ------------------------------------------------------ */
        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--line);
            border-left: 3px solid var(--line); /* overridden per priority below */
            border-radius: 8px;
            padding: 12px 14px;
            box-shadow: var(--shadow);
        }

        /* Signature: priority reads off the left edge and a small pill. */
        .card[data-priority="High"] {
            border-left-color: var(--p-high);
        }

        .card[data-priority="Medium"] {
            border-left-color: var(--p-medium);
        }

        .card[data-priority="Low"] {
            border-left-color: var(--p-low);
        }

        .card-title {
            margin: 0;
            font-size: 14.5px;
            font-weight: 600;
            color: var(--ink);
        }

        .card-description {
            margin: 6px 0 0;
            font-size: 13px;
            color: var(--ink-soft);
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
        }

        .priority-pill {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.02em;
            padding: 2px 8px;
            border-radius: 20px;
            color: #fff;
        }

        .priority-pill[data-priority="High"] {
            background: var(--p-high);
        }

        .priority-pill[data-priority="Medium"] {
            background: var(--p-medium);
        }

        .priority-pill[data-priority="Low"] {
            background: var(--p-low);
        }

        .assignee {
            font-size: 12.5px;
            color: var(--ink-soft);
        }

        .assignee.is-unassigned {
            color: var(--ink-faint);
            font-style: italic;
        }

        .edit-btn {
            margin-left: auto;
            font: inherit;
            font-size: 12.5px;
            font-weight: 500;
            color: var(--ink-soft);
            background: transparent;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 3px 10px;
            cursor: pointer;
        }

        .edit-btn:hover {
            background: var(--surface-sunk);
            color: var(--ink);
        }

        .edit-btn:focus-visible {
            outline: 2px solid var(--p-medium);
            outline-offset: 1px;
        }

        /* ---- Buttons (header + modal) ---------------------------------- */
        .btn-primary {
            font: inherit;
            font-size: 13.5px;
            font-weight: 600;
            color: #fff;
            background: var(--ink);
            border: 1px solid var(--ink);
            border-radius: 6px;
            padding: 7px 16px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-primary:hover {
            background: #2a3543;
        }

        .btn-secondary {
            font: inherit;
            font-size: 13.5px;
            font-weight: 600;
            color: var(--ink-soft);
            background: transparent;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 7px 16px;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: var(--surface-sunk);
            color: var(--ink);
        }

        .btn-primary:focus-visible,
        .btn-secondary:focus-visible {
            outline: 2px solid var(--p-medium);
            outline-offset: 2px;
        }

        /* ---- Modal ----------------------------------------------------- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 48px 16px;
            overflow-y: auto;
            background: rgba(20, 30, 45, 0.45);
        }

        .modal-overlay[hidden] {
            display: none;
        }

        .modal {
            width: 100%;
            max-width: 460px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px 22px 22px;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .modal-title {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .modal-close {
            font: inherit;
            font-size: 22px;
            line-height: 1;
            color: var(--ink-faint);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0 4px;
        }

        .modal-close:hover {
            color: var(--ink);
        }

        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--ink-soft);
            margin-bottom: 5px;
        }

        .field input,
        .field textarea,
        .field select {
            width: 100%;
            font: inherit;
            font-size: 14px;
            color: var(--ink);
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 8px 10px;
        }

        .field textarea {
            resize: vertical;
        }

        .field input:focus,
        .field textarea:focus,
        .field select:focus {
            outline: 2px solid var(--p-medium);
            outline-offset: 1px;
            border-color: var(--p-medium);
        }

        .field-row {
            display: flex;
            gap: 12px;
        }

        .field-row .field {
            flex: 1;
        }

        .field-error {
            margin: 5px 0 0;
            font-size: 12px;
            color: var(--p-high);
        }

        .field-error[hidden] {
            display: none;
        }

        /* Form-level banner for server errors not tied to a single field. */
        .form-banner {
            margin-bottom: 14px;
            padding: 9px 12px;
            border: 1px solid var(--p-high);
            border-radius: 6px;
            background: rgba(229, 72, 77, 0.06);
            color: var(--ink);
            font-size: 13px;
        }

        .form-banner[hidden] {
            display: none;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        /* ---- Board-level states (loading / error) ---------------------- */
        .board[hidden],
        .board-status[hidden] {
            display: none;
        }

        .board-status {
            max-width: 1180px;
            margin: 0 auto;
            padding: 20px 24px 48px;
        }

        .status-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 22px 24px;
            box-shadow: var(--shadow);
            color: var(--ink-soft);
            font-size: 14px;
        }

        .status-panel.is-error {
            border-color: var(--p-high);
            color: var(--ink);
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--line);
            border-top-color: var(--ink-soft);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .retry-btn {
            font: inherit;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            background: var(--p-high);
            border: 1px solid var(--p-high);
            border-radius: 6px;
            padding: 5px 14px;
            cursor: pointer;
        }

        .retry-btn:focus-visible {
            outline: 2px solid var(--p-medium);
            outline-offset: 2px;
        }

        /* Placeholder shown in a column with no tasks — keeps the column
           visible and preserves the drop area for later drag-and-drop. */
        .card-list-empty {
            margin: 0;
            padding: 14px 12px;
            text-align: center;
            font-size: 12.5px;
            color: var(--ink-faint);
            border: 1px dashed var(--line);
            border-radius: 8px;
        }

        /* ---- Drag & drop ----------------------------------------------- */
        .card {
            cursor: grab;
        }

        .card.is-dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        /* Highlight the column being hovered as a valid drop target. */
        .card-list.is-drop-target {
            outline: 2px dashed var(--p-medium);
            outline-offset: 3px;
            border-radius: 8px;
        }

        /* Transient message for drag/drop failures (revert notices). */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            max-width: 420px;
            padding: 12px 16px;
            border-radius: 8px;
            background: var(--ink);
            color: #fff;
            font-size: 13.5px;
            box-shadow: var(--shadow);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease;
            z-index: 10;
        }

        .toast.is-visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.is-error {
            background: var(--p-high);
        }

        /* ---- Responsive ------------------------------------------------ */
        @media (max-width: 720px) {
            .board {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header class="page-header">
        <div>
            <h1>Task Tracker</h1>
            <p>A simple Kanban board for moving work from idea to done.</p>
        </div>
        <button type="button" id="new-task-btn" class="btn-primary">New Task</button>
    </header>

    <!-- Board-level status: shown during loading and on fetch failure. -->
    <div id="board-status" class="board-status" hidden></div>

    <main class="board">
        <!-- data-status holds the stable, API-facing key; the visible label differs. -->
        <section class="column" data-status="ToDo">
            <div class="column-header">
                <span class="column-title">To Do</span>
                <span class="column-count" data-count>0</span>
            </div>
            <div class="card-list" data-status="ToDo"></div>
        </section>

        <section class="column" data-status="InProgress">
            <div class="column-header">
                <span class="column-title">In Progress</span>
                <span class="column-count" data-count>0</span>
            </div>
            <div class="card-list" data-status="InProgress"></div>
        </section>

        <section class="column" data-status="Done">
            <div class="column-header">
                <span class="column-title">Done</span>
                <span class="column-count" data-count>0</span>
            </div>
            <div class="card-list" data-status="Done"></div>
        </section>
    </main>

    <!-- Card markup lives in one place so tasks can be rendered from data later. -->
    <template id="card-template">
        <article class="card" data-id="" data-priority="" draggable="true">
            <h3 class="card-title"></h3>
            <p class="card-description"></p>
            <div class="card-meta">
                <span class="priority-pill" data-priority=""></span>
                <span class="assignee"></span>
                <button type="button" class="edit-btn">Edit</button>
            </div>
        </article>
    </template>

    <!-- Create/edit task modal. Hidden until opened from "New Task" or a card's Edit. -->
    <div id="task-modal" class="modal-overlay" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">New Task</h2>
                <button type="button" id="modal-close" class="modal-close" aria-label="Close">&times;</button>
            </div>

            <form id="task-form" novalidate>
                <input type="hidden" name="taskId" id="field-taskId">

                <div class="form-banner" id="form-banner" hidden></div>

                <div class="field">
                    <label for="field-title">Title</label>
                    <input type="text" id="field-title" name="title" autocomplete="off">
                    <p class="field-error" data-error-for="title" hidden></p>
                </div>

                <div class="field">
                    <label for="field-description">Description</label>
                    <textarea id="field-description" name="description" rows="3"></textarea>
                    <p class="field-error" data-error-for="description" hidden></p>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label for="field-status">Status</label>
                        <select id="field-status" name="status">
                            <option value="ToDo">To Do</option>
                            <option value="InProgress">In Progress</option>
                            <option value="Done">Done</option>
                        </select>
                        <p class="field-error" data-error-for="status" hidden></p>
                    </div>
                    <div class="field">
                        <label for="field-priority">Priority</label>
                        <select id="field-priority" name="priority">
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                        <p class="field-error" data-error-for="priority" hidden></p>
                    </div>
                </div>

                <div class="field">
                    <label for="field-assignee">Assignee</label>
                    <input type="text" id="field-assignee" name="assignee" autocomplete="off">
                    <p class="field-error" data-error-for="assignee" hidden></p>
                </div>

                <div class="modal-footer">
                    <button type="button" id="modal-cancel" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000";

        // The single source of truth. Replaced wholesale by each fetch, then rendered.
        let tasks = [];

        // Statuses the board can display, in column order. Anything else is ignored.
        const STATUSES = ["ToDo", "InProgress", "Done"];

        // Lower rank sorts first: High before Medium before Low.
        const PRIORITY_RANK = { High: 0, Medium: 1, Low: 2 };

        const template = document.getElementById("card-template");

        const boardEl = document.querySelector(".board");
        const statusEl = document.getElementById("board-status");

        // Pull tasks from the API into the shared `tasks` array, then render.
        async function fetchTasks() {
            const response = await fetch(`${API_BASE}/tasks`);
            if (!response.ok) {
                throw new Error(`Failed to load tasks: ${response.status}`);
            }
            tasks = await response.json();
            renderBoard(tasks);
            return tasks;
        }

        // Placeholder for a column with no tasks. Sits inside the card-list so
        // the column keeps its shape and remains a valid drop target later.
        function renderEmptyPlaceholder() {
            const el = document.createElement("p");
            el.className = "card-list-empty";
            el.textContent = "No tasks";
            return el;
        }

        function buildLoadingPanel() {
            const panel = document.createElement("div");
            panel.className = "status-panel";
            panel.setAttribute("role", "status");
            panel.innerHTML =
                '<span class="spinner" aria-hidden="true"></span><span>Loading tasks…</span>';
            return panel;
        }

        function buildErrorPanel() {
            const panel = document.createElement("div");
            panel.className = "status-panel is-error";
            panel.setAttribute("role", "alert");

            const message = document.createElement("span");
            message.textContent = "Couldn't load tasks. Check your connection and try again.";

            const retry = document.createElement("button");
            retry.type = "button";
            retry.className = "retry-btn";
            retry.textContent = "Retry";
            retry.addEventListener("click", loadTasks);

            panel.append(message, retry);
            return panel;
        }

        // Board-level state switch. "ready" (used for both populated and empty
        // boards) shows the columns; "loading"/"error" show a status panel.
        function setBoardState(state) {
            if (state === "ready") {
                statusEl.hidden = true;
                statusEl.innerHTML = "";
                boardEl.hidden = false;
                return;
            }

            boardEl.hidden = true;
            statusEl.innerHTML = "";
            statusEl.appendChild(
                state === "error" ? buildErrorPanel() : buildLoadingPanel()
            );
            statusEl.hidden = false;
        }

        // Orchestrates the four UI states around a single fetch.
        async function loadTasks() {
            setBoardState("loading");
            try {
                await fetchTasks(); // sets `tasks` and renders columns (incl. empty)
                setBoardState("ready");
            } catch (err) {
                console.error(err);
                setBoardState("error");
            }
        }

        function renderCard(task) {
            const card = template.content.firstElementChild.cloneNode(true);
            card.dataset.id = task.id;
            card.dataset.priority = task.priority;

            card.querySelector(".card-title").textContent = task.title;

            // Description is optional — drop the element entirely when absent.
            const description = card.querySelector(".card-description");
            if (task.description) {
                description.textContent = task.description;
            } else {
                description.remove();
            }

            const pill = card.querySelector(".priority-pill");
            pill.dataset.priority = task.priority;
            pill.textContent = task.priority;

            const assignee = card.querySelector(".assignee");
            if (task.assignee) {
                assignee.textContent = task.assignee;
            } else {
                assignee.textContent = "Unassigned";
                assignee.classList.add("is-unassigned");
            }

            return card;
        }

        // Group tasks by status, ordering each column by priority (High → Low),
        // breaking ties by id ascending.
        function groupByStatus(taskList) {
            const groups = Object.fromEntries(STATUSES.map((status) => [status, []]));

            for (const task of taskList) {
                if (groups[task.status]) groups[task.status].push(task);
            }

            for (const status of STATUSES) {
                groups[status].sort((a, b) => {
                    const byPriority = PRIORITY_RANK[a.priority] - PRIORITY_RANK[b.priority];
                    return byPriority !== 0 ? byPriority : a.id - b.id;
                });
            }

            return groups;
        }

        function renderBoard(taskList) {
            const groups = groupByStatus(taskList);

            // Render each column independently — empty columns stay visible.
            document.querySelectorAll(".column").forEach((column) => {
                const status = column.dataset.status;
                const list = column.querySelector(".card-list");
                const columnTasks = groups[status] || [];

                list.innerHTML = "";
                if (columnTasks.length === 0) {
                    // Empty columns stay visible and keep their drop area.
                    list.appendChild(renderEmptyPlaceholder());
                } else {
                    for (const task of columnTasks) {
                        list.appendChild(renderCard(task));
                    }
                }

                column.querySelector("[data-count]").textContent = columnTasks.length;
            });
        }

        // ---- Drag & drop -------------------------------------------------

        // The card currently being dragged, kept alongside dataTransfer since
        // dataTransfer's data is not readable during dragover in every browser.
        let draggedId = null;
        let toastTimer = null;

        function clearDropTargets() {
            document
                .querySelectorAll(".card-list.is-drop-target")
                .forEach((list) => list.classList.remove("is-drop-target"));
        }

        // Brief, self-dismissing message — used for drag revert notices.
        function showToast(message, isError = false) {
            let toast = document.getElementById("toast");
            if (!toast) {
                toast = document.createElement("div");
                toast.id = "toast";
                toast.className = "toast";
                toast.setAttribute("role", "alert");
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.classList.toggle("is-error", isError);
            toast.classList.add("is-visible");
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove("is-visible"), 5000);
        }

        // Pull a readable message out of a 4xx response. FastAPI validation
        // errors arrive as { detail: [{ msg, ... }] }; simpler errors as a
        // { detail: "..." } string. Fall back to the status code.
        async function extractServerError(response) {
            try {
                const data = await response.json();
                if (typeof data.detail === "string") return data.detail;
                if (Array.isArray(data.detail)) {
                    const msg = data.detail
                        .map((d) => d && d.msg)
                        .filter(Boolean)
                        .join("; ");
                    if (msg) return msg;
                }
            } catch (_) {
                /* body wasn't JSON — fall through to the generic message */
            }
            return `Couldn't update task (${response.status}).`;
        }

        // Move a card to a new status: optimistic update first, then PATCH.
        // Reverts and re-renders if the server rejects it or is unreachable.
        async function moveTask(id, targetStatus) {
            const task = tasks.find((t) => String(t.id) === String(id));
            if (!task) return;

            const previousStatus = task.status;
            // No-op when dropped back on its own column.
            if (previousStatus === targetStatus) return;

            // Optimistic: reflect the move locally before the request resolves.
            task.status = targetStatus;
            renderBoard(tasks);

            try {
                const response = await fetch(`${API_BASE}/tasks/${id}`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ status: targetStatus }),
                });

                if (!response.ok) {
                    task.status = previousStatus;
                    renderBoard(tasks);
                    showToast(await extractServerError(response), true);
                }
                // 200: nothing to do — the optimistic state already stands.
            } catch (err) {
                console.error(err);
                task.status = previousStatus;
                renderBoard(tasks);
                showToast("Couldn't reach the server — your change wasn't saved.", true);
            }
        }

        // Delegated on the board so handlers survive re-renders.
        boardEl.addEventListener("dragstart", (event) => {
            const card = event.target.closest(".card");
            if (!card) return;
            draggedId = card.dataset.id;
            event.dataTransfer.effectAllowed = "move";
            event.dataTransfer.setData("text/plain", card.dataset.id);
            card.classList.add("is-dragging");
        });

        boardEl.addEventListener("dragend", (event) => {
            const card = event.target.closest(".card");
            if (card) card.classList.remove("is-dragging");
            clearDropTargets();
            draggedId = null;
        });

        boardEl.addEventListener("dragover", (event) => {
            const list = event.target.closest(".card-list");
            if (!list) return;
            event.preventDefault(); // required to allow a drop
            event.dataTransfer.dropEffect = "move";
            if (!list.classList.contains("is-drop-target")) {
                clearDropTargets();
                list.classList.add("is-drop-target");
            }
        });

        boardEl.addEventListener("drop", (event) => {
            const list = event.target.closest(".card-list");
            if (!list) return;
            event.preventDefault();
            clearDropTargets();
            const id = event.dataTransfer.getData("text/plain") || draggedId;
            if (id == null || id === "") return;
            moveTask(id, list.dataset.status);
        });

        // ---- Create / edit modal ----------------------------------------

        const modal = document.getElementById("task-modal");
        const form = document.getElementById("task-form");
        const modalTitle = document.getElementById("modal-title");
        const formBanner = document.getElementById("form-banner");

        // Wipe both the form-level banner and every per-field error slot.
        function clearModalErrors() {
            formBanner.hidden = true;
            formBanner.textContent = "";
            form.querySelectorAll(".field-error").forEach((slot) => {
                slot.hidden = true;
                slot.textContent = "";
            });
        }

        // Show a field-level error, falling back to the banner if there's no
        // matching slot for the field name.
        function showFieldError(field, message) {
            const slot = form.querySelector(`.field-error[data-error-for="${field}"]`);
            if (slot) {
                slot.textContent = message;
                slot.hidden = false;
            } else {
                showBannerError(message);
            }
        }

        function showBannerError(message) {
            // Append so multiple unmapped errors don't clobber each other.
            formBanner.textContent = formBanner.textContent
                ? `${formBanner.textContent}; ${message}`
                : message;
            formBanner.hidden = false;
        }

        // Route a 422 body onto field slots. FastAPI sends
        // { detail: [{ loc: ["body", "title"], msg }] }; a plain string detail
        // (or anything else) goes to the banner.
        function showValidationErrors(detail) {
            if (Array.isArray(detail)) {
                for (const item of detail) {
                    const field = Array.isArray(item.loc) ? item.loc[item.loc.length - 1] : null;
                    showFieldError(field, item.msg || "Invalid value");
                }
                return;
            }
            showBannerError(typeof detail === "string" ? detail : "Couldn't save the task.");
        }

        // Open in create mode (no task) or edit mode (task from the board data).
        function openModal(task) {
            clearModalErrors();
            form.reset();

            // form.elements.<name> avoids the HTMLFormElement named-getter
            // collision with inherited props (e.g. form.title === the attribute).
            const f = form.elements;
            if (task) {
                modalTitle.textContent = "Edit Task";
                f.taskId.value = task.id;
                f.title.value = task.title || "";
                f.description.value = task.description || "";
                f.status.value = task.status || "ToDo";
                f.priority.value = task.priority || "Medium";
                f.assignee.value = task.assignee || "";
            } else {
                modalTitle.textContent = "New Task";
                f.taskId.value = "";
                f.status.value = "ToDo";
                f.priority.value = "Medium";
            }

            modal.hidden = false;
            f.title.focus();
        }

        function closeModal() {
            modal.hidden = true;
            clearModalErrors();
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            clearModalErrors();

            const f = form.elements;
            const title = f.title.value.trim();
            if (!title) {
                showFieldError("title", "Title is required");
                f.title.focus();
                return; // client validation failed — no request
            }

            const assignee = f.assignee.value.trim();
            const payload = {
                title,
                description: f.description.value, // empty stays "" per spec
                status: f.status.value,
                priority: f.priority.value,
                assignee: assignee === "" ? null : assignee,
            };

            const id = f.taskId.value;
            const isEdit = id !== "";
            const url = isEdit ? `${API_BASE}/tasks/${id}` : `${API_BASE}/tasks`;
            const method = isEdit ? "PATCH" : "POST";

            try {
                const response = await fetch(url, {
                    method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });

                if (response.ok) {
                    closeModal();
                    await fetchTasks(); // refresh the board with server truth
                    return;
                }

                if (response.status === 422) {
                    let detail = null;
                    try {
                        detail = (await response.json()).detail;
                    } catch (_) {
                        /* non-JSON body — showValidationErrors falls back to banner */
                    }
                    showValidationErrors(detail); // keep modal open
                    return;
                }

                showBannerError(await extractServerError(response));
            } catch (err) {
                console.error(err);
                showBannerError("Couldn't reach the server — your change wasn't saved.");
            }
        });

        // Open triggers.
        document.getElementById("new-task-btn").addEventListener("click", () => openModal());

        // Edit is delegated on the board so it survives re-renders; look the task
        // up in the shared `tasks` array by the card's id.
        boardEl.addEventListener("click", (event) => {
            const btn = event.target.closest(".edit-btn");
            if (!btn) return;
            const card = btn.closest(".card");
            if (!card) return;
            const task = tasks.find((t) => String(t.id) === String(card.dataset.id));
            if (task) openModal(task);
        });

        // Close triggers: Cancel, close button, overlay click, Escape.
        document.getElementById("modal-cancel").addEventListener("click", closeModal);
        document.getElementById("modal-close").addEventListener("click", closeModal);
        modal.addEventListener("click", (event) => {
            if (event.target === modal) closeModal(); // click on overlay, not the dialog
        });
        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && !modal.hidden) closeModal();
        });

        // Kick things off: loading → ready (or error, with Retry).
        loadTasks();
    </script>

</body>

</html>
